<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator — Illiza Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Epilogue:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral:     #FF6B6B;
      --coral-dark:#e05252;
      --amber:     #FFB347;
      --lemon:     #FFE66D;
      --dark:      #1A1A2E;
      --white:     #FAFAFA;
      --text:      #1A1A2E;
      --text2:     #4A4A6A;
      --muted:     #8888AA;
      --surface2:  #F5F5F0;
      --border:    rgba(26,26,46,0.10);
      --border2:   rgba(26,26,46,0.18);
      --shadow-coral: 0 8px 32px rgba(255,107,107,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Epilogue', sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }
    #cursor {
      width: 12px; height: 12px;
      background: var(--coral);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: multiply;
      transition: width .2s, height .2s;
    }
    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-1 { width:500px;height:500px; background:radial-gradient(circle,rgba(255,107,107,.12),transparent 70%); top:-120px;left:-100px; }
    .orb-2 { width:400px;height:400px; background:radial-gradient(circle,rgba(255,230,109,.18),transparent 70%); bottom:80px;right:-80px; }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 50;
      padding: 16px 48px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(250,250,250,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 24px rgba(26,26,46,0.06);
    }
    .logo { font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--text); }
    .logo span { color:var(--coral); }
    nav { display:flex; gap:4px; }
    nav a {
      font-size:13.5px; font-weight:500; color:var(--text2);
      text-decoration:none; padding:8px 16px; border-radius:100px; transition:all .22s; cursor:none;
    }
    nav a:hover { color:var(--coral); background:rgba(255,107,107,0.08); }
    nav a.active { color:white; background:var(--coral); font-weight:600; }
    .back-link {
      font-family:'JetBrains Mono',monospace; font-size:12px;
      color:var(--coral); opacity:0.75;
      display:flex; align-items:center; gap:6px;
      text-decoration:none; transition:opacity .2s; cursor:none;
    }
    .back-link:hover { opacity:1; }

    /* Page */
    .calc-page {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      padding: 60px 24px 80px;
    }
    .calc-page-header { text-align:center; margin-bottom:32px; }
    .calc-eyebrow {
      font-family:'JetBrains Mono',monospace; font-size:11px;
      color:var(--coral); letter-spacing:.18em; opacity:0.7; margin-bottom:12px;
    }
    .calc-page-title {
      font-family:'Fraunces',serif; font-size:44px; font-weight:700;
      background:linear-gradient(135deg,var(--coral),var(--amber));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:10px;
    }
    .calc-page-desc { color:var(--muted); font-size:14px; }

    .team-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--dark); color:rgba(250,250,250,0.7);
      border-radius:100px; padding:8px 20px; margin-bottom:44px;
      font-family:'JetBrains Mono',monospace; font-size:11px;
    }
    .team-badge strong { color:var(--amber); }
  </style>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
<div id="cursor"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>
  <div class="logo"><span>/</span>illiza</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html">Gallery</a>
    <a href="calculator.html" class="active">Calculator</a>
    <a href="index.html">Contact</a>
  </nav>
  <a href="index.html" class="back-link">← Back to Portfolio</a>
</header>

<div class="calc-page">
  <div class="calc-page-header">
    <div class="calc-eyebrow">006 — PROJECT</div>
    <h1 class="calc-page-title">Scientific Calculator</h1>
    <p class="calc-page-desc">Fully functional — trig, log, roots, constants, keyboard support &amp; more.</p>
  </div>

  <div class="team-badge">
    🎓 Group Project &nbsp;·&nbsp; <strong>Informatics · Syiah Kuala University</strong>
  </div>

  <div class="calc-wrapper">
    <div class="calculator">
      <div class="calc-header">
        <span class="calc-title">SCIENTIFIC CALC</span>
        <span class="calc-mode" id="angleMode">DEG</span>
      </div>
      <div class="calc-display">
        <div class="calc-expression" id="expression"></div>
        <div class="calc-result" id="result">0</div>
      </div>
      <div class="calc-buttons">
        <button class="btn btn-fn"  onclick="toggleAngle()">DEG/RAD</button>
        <button class="btn btn-fn"  onclick="clearAll()">AC</button>
        <button class="btn btn-fn"  onclick="deleteLast()">⌫</button>
        <button class="btn btn-op"  onclick="inputOperator('/')">÷</button>
        <button class="btn btn-fn"  onclick="inputFunction('sin')">sin</button>
        <button class="btn btn-fn"  onclick="inputFunction('cos')">cos</button>
        <button class="btn btn-fn"  onclick="inputFunction('tan')">tan</button>
        <button class="btn btn-op"  onclick="inputOperator('*')">×</button>
        <button class="btn btn-fn"  onclick="inputFunction('sqrt')">√</button>
        <button class="btn btn-fn"  onclick="inputPower()">xʸ</button>
        <button class="btn btn-fn"  onclick="inputSquare()">x²</button>
        <button class="btn btn-op"  onclick="inputOperator('-')">−</button>
        <button class="btn btn-fn"  onclick="inputFunction('log')">log</button>
        <button class="btn btn-fn"  onclick="inputFunction('ln')">ln</button>
        <button class="btn btn-fn"  onclick="inputConstant('pi')">π</button>
        <button class="btn btn-op"  onclick="inputOperator('+')">+</button>
        <button class="btn btn-num" onclick="inputNumber('7')">7</button>
        <button class="btn btn-num" onclick="inputNumber('8')">8</button>
        <button class="btn btn-num" onclick="inputNumber('9')">9</button>
        <button class="btn btn-fn"  onclick="inputParenthesis('(')">( )</button>
        <button class="btn btn-num" onclick="inputNumber('4')">4</button>
        <button class="btn btn-num" onclick="inputNumber('5')">5</button>
        <button class="btn btn-num" onclick="inputNumber('6')">6</button>
        <button class="btn btn-fn"  onclick="inputConstant('e')">e</button>
        <button class="btn btn-num" onclick="inputNumber('1')">1</button>
        <button class="btn btn-num" onclick="inputNumber('2')">2</button>
        <button class="btn btn-num" onclick="inputNumber('3')">3</button>
        <button class="btn btn-fn"  onclick="inputPercent()">%</button>
        <button class="btn btn-num btn-zero" onclick="inputNumber('0')">0</button>
        <button class="btn btn-num" onclick="inputDot()">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>
      </div>
    </div>
  </div>
</div>

<script>
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
</script>
<script src="calculator.js"></script>
</body>
</html>
